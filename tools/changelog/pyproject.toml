# Scopes pytest to this self-contained tool: the ``[tool.pytest.ini_options]``
# section makes pytest treat ``tools/changelog/`` as its rootdir, so:
#
#   1. ``pythonpath = ["."]`` adds ``tools/changelog/`` to ``sys.path``,
#      making ``import cli`` work from the test files without any shim.
#   2. ``tools/conftest.py`` (a session-takeover hook for the IsaacLab
#      source/ test suite) sits *above* rootdir and is therefore not
#      loaded — no ``--noconftest`` flag required.
#
# Run with: ``./isaaclab.sh -p -m pytest tools/changelog/``
[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["test"]
